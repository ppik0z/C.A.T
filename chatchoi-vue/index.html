<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/pwa/cat-icon.svg" />
    <link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6750a4" />
    <meta name="description" content="Ứng dụng nhắn tin thời gian thực." />
    <meta name="referrer" content="no-referrer" />
    <title>ChatChoi</title>
    <style>
      /* Inline splash — replaced when Vue mounts */
      .boot-splash{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;height:100dvh;width:100%;background:#fffbff}
      .boot-splash img{width:80px;height:80px;border-radius:16px}
      .boot-dots{display:flex;align-items:center;gap:6px}
      .boot-dot{width:8px;height:8px;border-radius:50%;background:#6750a4;animation:bdot 1.2s ease-in-out infinite}
      .boot-dot:nth-child(2){animation-delay:.15s}
      .boot-dot:nth-child(3){animation-delay:.3s}
      @keyframes bdot{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.3)}}
      @media(prefers-color-scheme:dark){.boot-splash{background:#1c1b1f}}
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-splash" aria-busy="true" aria-live="polite">
        <img alt="ChatChoi" height="512" src="/pwa/cat-icon.svg" width="512" />
        <div class="boot-dots">
          <span class="boot-dot"></span>
          <span class="boot-dot"></span>
          <span class="boot-dot"></span>
        </div>
        <span style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Đang tải...</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
